name: Test and deploy to PythonAnywhere

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pythonanywhere-production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run tests
        run: python -m pytest --quiet

      - name: Validate deployment secrets
        env:
          PA_API_TOKEN: ${{ secrets.PA_TOKEN }}
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set -euo pipefail
          test -n "$PA_API_TOKEN"
          test -n "$PA_USERNAME"

      - name: Upload application files
        env:
          PA_API_TOKEN: ${{ secrets.PA_TOKEN }}
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
          PA_PROJECT_PATH: ConferenceAgenda
        run: |
          set -euo pipefail
          remote_root="/home/${PA_USERNAME}/${PA_PROJECT_PATH}"

          while IFS= read -r file; do
            echo "Uploading ${file}"
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --retry 3 \
              --header "Authorization: Token ${PA_API_TOKEN}" \
              --form "content=@${file}" \
              "https://www.pythonanywhere.com/api/v0/user/${PA_USERNAME}/files/path${remote_root}/${file}"
          done < <(git ls-files)

      - name: Reload web application
        env:
          PA_API_TOKEN: ${{ secrets.PA_TOKEN }}
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
        run: |
          set -euo pipefail
          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 3 \
            --request POST \
            --header "Authorization: Token ${PA_API_TOKEN}" \
            "https://www.pythonanywhere.com/api/v0/user/${PA_USERNAME}/webapps/${PA_USERNAME}.pythonanywhere.com/reload/"
